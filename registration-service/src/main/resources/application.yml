server:
  port: 8080

spring:
  application:
    name: registration-service
  datasource:
    # In-cluster K8s Service DNS name, standard port - no more localhost:5433
    # workaround, that was only needed to dodge the native Windows Postgres
    # conflict on your own laptop, which doesn't exist inside the cluster.
    url: jdbc:postgresql://postgres:5432/eventdb
    username: eventapp
    password: changeme_local_dev
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# In-cluster K8s Service DNS name for Event Service too - was
# http://localhost:8081 for local testing, now the real service name.
event-service:
  base-url: http://event-service:8080

app:
  seat-threshold: 10

aws:
  region: us-east-1
  lambda:
    function-name: seat-threshold-notifier

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
