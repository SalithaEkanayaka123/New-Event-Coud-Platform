# Repo (add this locally now, no cluster needed):
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update

prometheus:
  prometheusSpec:
    retention: 3d
    # Short retention - this is a coursework demo, not a production
    # system needing months of history. Keeps disk/memory small.
    resources:
      requests:
        memory: "300Mi"
        cpu: "100m"
      limits:
        memory: "500Mi"
        cpu: "300m"

grafana:
  resources:
    requests:
      memory: "100Mi"
      cpu: "50m"
    limits:
      memory: "200Mi"
      cpu: "150m"
  # Default admin password - change before actually installing (Day 15)
  adminPassword: "CHANGE_ME_BEFORE_INSTALLING"

# Your 3 services already expose /actuator/prometheus (added Day 2-4) -
# kube-prometheus-stack auto-discovers pods via ServiceMonitor CRDs once
# you add the right annotations/labels on Day 15's actual deployment.
