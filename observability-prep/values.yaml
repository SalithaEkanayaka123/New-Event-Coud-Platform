# Repo (add this locally now, no cluster needed):
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update

prometheus:
  prometheusSpec:
    nodeSelector:
      role: analytics
    retention: 3d
    # Short retention - this is a coursework demo, not a production
    # system needing months of history. Keeps disk/memory small.
    resources:
      requests:
        memory: "300Mi"
        cpu: "100m"
      limits:
        memory: "600Mi"
        cpu: "300m"

grafana:
  nodeSelector:
    role: analytics
  resources:
    requests:
      memory: "200Mi"
      cpu: "100m"
    limits:
      memory: "450Mi"
      cpu: "500m"
  # ^ RESIZED (Day 16 incident): the original 250Mi/150m limits caused
  #   exit-137 kills and a liveness-probe restart loop - Grafana v13 was
  #   CPU-throttled so hard it failed its own health check. Same failure
  #   class as the Metabase OOM and the Spring Boot probe storm.
  adminPassword: "grafana_adm1n_2026"
  service:
    type: NodePort
    nodePort: 30301
  # ^ Same direct-access pattern as Metabase (30300) - avoids the
  #   flaky port-forward path entirely. Needs the SG rule for 30301.

alertmanager:
  enabled: false
  # ^ Not needed for the coursework; saves ~200Mi on Node 2

kubeStateMetrics:
  nodeSelector:
    role: analytics
  # ^ Small pod, but keep all monitoring components on the
  #   analytics node for a clean placement story

# node-exporter is a DaemonSet - deliberately NOT given a nodeSelector:
# it must run on BOTH nodes to collect per-node metrics. That's the point.

# The 3 services already expose /actuator/prometheus (added Day 2-4) -
# kube-prometheus-stack auto-discovers pods via ServiceMonitor CRDs once
# the right annotations/labels are added.