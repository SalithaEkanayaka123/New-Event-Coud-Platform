apiVersion: apps/v1
kind: Deployment
metadata:
  name: registration-service-blue
  labels:
    app: registration-service
    color: blue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registration-service
      color: blue
  template:
    metadata:
      labels:
        app: registration-service
        color: blue
    spec:
      nodeSelector:
        role: core
      # No AWS credentials here at all (no env vars, no mounted secret) -
      # LambdaSeatThresholdNotifier picks up the EC2 instance's own IAM
      # role automatically via the AWS SDK's default credential chain.
      # See the IAM policy step in the deployment instructions.
      containers:
        - name: registration-service
          image: salitha12345/new-event-registration-service:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "300Mi"
              cpu: "200m"
            limits:
              memory: "450Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 20
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registration-service-green
  labels:
    app: registration-service
    color: green
spec:
  replicas: 0
  selector:
    matchLabels:
      app: registration-service
      color: green
  template:
    metadata:
      labels:
        app: registration-service
        color: green
    spec:
      nodeSelector:
        role: core
      containers:
        - name: registration-service
          image: salitha12345/new-event-registration-service:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "300Mi"
              cpu: "200m"
            limits:
              memory: "450Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: registration-service
spec:
  selector:
    app: registration-service
    color: blue
  ports:
    - port: 8080
      targetPort: 8080