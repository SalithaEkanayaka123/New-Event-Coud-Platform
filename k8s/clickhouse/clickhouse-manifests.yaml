apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clickhouse-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# Same fix as Day 8's docker-compose zz- prefixed file, in K8s form:
# setting CLICKHOUSE_USER/CLICKHOUSE_PASSWORD makes ClickHouse auto-generate
# a users config with access_management: 0 for the default user. This
# override loads last (zz- prefix, alphabetical order in users.d) and wins,
# restoring the default user's ability to CREATE USER / GRANT.
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-users-override
data:
  zz-enable-access-management.xml: |
    <clickhouse>
      <users>
        <default>
          <access_management>1</access_management>
        </default>
      </users>
    </clickhouse>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse
  labels:
    app: clickhouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      nodeSelector:
        role: analytics
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.8
          ports:
            - containerPort: 8123 # HTTP interface - what analytics.js uses
            - containerPort: 9000 # native protocol
          env:
            - name: CLICKHOUSE_DB
              value: "analytics"
            - name: CLICKHOUSE_USER
              value: "default"
            - name: CLICKHOUSE_PASSWORD
              value: "changeme_local_dev" # change before real deployment
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "900Mi"
              cpu: "1"
          volumeMounts:
            - name: clickhouse-storage
              mountPath: /var/lib/clickhouse
            - name: users-override
              mountPath: /etc/clickhouse-server/users.d/zz-enable-access-management.xml
              subPath: zz-enable-access-management.xml
      volumes:
        - name: clickhouse-storage
          persistentVolumeClaim:
            claimName: clickhouse-data
        - name: users-override
          configMap:
            name: clickhouse-users-override
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
spec:
  selector:
    app: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000