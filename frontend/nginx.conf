server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Actuator-style health check for your own sanity checks / future
    # observability - Nginx itself doesn't need Prometheus metrics for
    # this coursework, but a plain health endpoint costs nothing.
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
