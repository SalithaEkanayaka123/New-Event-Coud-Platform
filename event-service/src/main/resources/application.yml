server:
  port: 8080

spring:
  application:
    name: event-service
  datasource:
    url: jdbc:postgresql://postgres:5432/eventdb
    username: eventapp
    password: changeme_local_dev
  jpa:
    hibernate:
      # update is fine for local dev; we'll switch to a proper migration
      # tool (Flyway/Liquibase) mention in the report if there's time -
      # for now this keeps Sprint 1 moving
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  # health,info exposed for basic checks; prometheus exposed for the
  # Observability requirement (#6) - Prometheus will scrape this later
  # once deployed to the cluster (Day 14)
