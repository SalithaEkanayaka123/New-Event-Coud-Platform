version: '3.8'

# Local-first workflow (per module guidance): build and test everything here
# before deploying to the k3s cluster. Uncomment each service as you build it
# through Sprint 1 (Days 3-7).

services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: eventapp
      POSTGRES_PASSWORD: changeme_local_dev
      POSTGRES_DB: eventdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Day 4-5: Event Service ---
